# Ansible Inventory Template for CI/CD
# This file is used by GitHub Actions to generate inventory.ini at runtime
# DO NOT commit actual credentials - use GitHub Secrets instead

[fleema_app]
fleema-dev ansible_host=EC2_PUBLIC_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/fleema-dev-key.pem

[fleema_app:vars]
db_host=RDS_ENDPOINT
db_port=5432
db_name=fleema
db_username=fleema_admin
redis_host=REDIS_ENDPOINT
redis_port=6379
app_environment=dev
