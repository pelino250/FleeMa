# ─────────────────────────────────────────────
# Ansible Inventory
# Define your EC2 instance connection details
# ─────────────────────────────────────────────
# INSTRUCTIONS:
# 1. After running terraform apply, get EC2 public IP
# 2. Replace REPLACE_WITH_EC2_PUBLIC_IP below
# 3. Verify SSH key path is correct
# ─────────────────────────────────────────────

[fleema_app]
# Replace this with your actual EC2 public IP from terraform output
fleema-dev ansible_host=REPLACE_WITH_EC2_PUBLIC_IP

[fleema_app:vars]
# SSH connection settings
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/fleema-dev-key.pem
ansible_python_interpreter=/usr/bin/python3

# Application settings
app_name=fleema
app_user=fleema
app_dir=/home/fleema/app
docker_compose_version=2.24.0

# Database connection (from terraform outputs)
db_host=REPLACE_WITH_RDS_ENDPOINT
db_port=5432
db_name=fleema
db_username=fleema_admin
# Note: db_password should be passed via --extra-vars or encrypted with ansible-vault

# Redis connection (from terraform outputs)
redis_host=REPLACE_WITH_REDIS_ENDPOINT
redis_port=6379

# Environment
environment=dev
